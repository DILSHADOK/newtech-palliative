<!DOCTYPE html>
<html>
<head>
<title>Delivery Status</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>
<body>
<nav><h2>PalliativeCare+</h2><ul><li><a href="index.html">Home</a></li></ul></nav>

<section class="container">
<h2 class="section-title">Order Equipment</h2>

<div id="orderContainer" class="grid"></div>

</section>

<script>
const API_BASE_URL = 'https://palliative-backend.onrender.com';

// render equipments with order controls using backend
async function loadEquipments() {
    try{
        let res = await fetch(API_BASE_URL + '/api/equipments');
        if(!res.ok) throw new Error(`API Error: ${res.status}`);
        let equipments = await res.json();
        let container = document.getElementById('orderContainer');
        container.innerHTML = '';
        
        if(!equipments || Object.keys(equipments).length === 0) {
            container.innerHTML = '<div style="text-align: center; padding: 40px; color: #999;"><p>No equipment available at the moment. Please check back later.</p></div>';
            return;
        }
        
        for (let name in equipments) {
            let qty = equipments[name];
            let card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <h3>${name}</h3>
                <p>Available: <strong>${qty}</strong></p>
                <input type="number" min="1" max="${qty}" placeholder="Quantity" id="order-${name}" />
                <button class="btn" onclick="placeOrder('${name}')">Order</button>
            `;
            container.appendChild(card);
        }
    } catch(e){
        console.error('load equip failed', e);
        document.getElementById('orderContainer').innerHTML = '<div style="text-align: center; padding: 40px; color: red;"><p>Error loading equipment. Please refresh the page.</p></div>';
    }
}

async function placeOrder(name) {
    let input = document.getElementById('order-' + name);
    let qty = parseInt(input.value);
    if (!qty || qty < 1) {
        alert('Enter a valid quantity');
        return;
    }
    // send to backend
    try{
        let res = await fetch(API_BASE_URL + '/api/orders', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({name, qty})
        });
        if(res.ok){
            alert('Order placed. Admin will be notified.');
            loadEquipments();
        } else {
            let err = await res.json();
            alert('Error: '+err.error);
        }
    } catch(e){
        console.error(e);
        alert('Network error');
    }
}

// load on page ready
window.addEventListener('DOMContentLoaded', loadEquipments);
</script>

<footer>© 2026 PalliativeCare+</footer>
</body>
</html>
