services:
  - type: web
    name: palliative-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: palliative_db
          property: connectionString

databases:
  - name: palliative_db
    databaseName: palliative_db
    plan: free
